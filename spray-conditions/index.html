<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spray Conditions</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Spray Conditions</h1>
      <p class="instructions">Click a map location to load NOAA hourly conditions for right now.</p>

      <section id="map" aria-label="Map for selecting spray location"></section>

      <section id="statusBanner" class="status pending" aria-live="polite">
        Select a map location to evaluate current spray conditions.
      </section>

      <p id="confidence" class="confidence">Confidence: —</p>
      <p id="debug" class="debug">Debug: —</p>

      <section class="card">
        <h2>Current Inputs</h2>
        <dl id="weatherDetails" class="details">
          <div><dt>Location</dt><dd>—</dd></div>
          <div><dt>Wind Speed</dt><dd>—</dd></div>
          <div><dt>Wind Gust</dt><dd>—</dd></div>
          <div><dt>Wind Direction</dt><dd>—</dd></div>
          <div><dt>Temperature</dt><dd>—</dd></div>
          <div><dt>Humidity</dt><dd>—</dd></div>
          <div><dt>Delta-T</dt><dd>—</dd></div>
          <div><dt>Rain Probability</dt><dd>—</dd></div>
        </dl>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
